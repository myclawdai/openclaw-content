name: Deploy to GitHub Pages and cross-post to Dev.to
on:
  push:
    branches: [ main ]
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - name: Install dependencies
        run: bundle install
      - name: Build site
        run: bundle exec jekyll build
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
      - name: Cross-post to Dev.to
        if: github.ref == 'refs/heads/main'
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the most recent markdown post (excluding drafts)
          POST_FILE=$(find _posts -name '*.md' | sort -r | head -n 1)
          if [ -z "$POST_FILE" ]; then
            echo "No post found"
            exit 0
          fi
          # Extract title (first H1) or fallback to filename
          TITLE=$(grep -m 1 '^# ' "$POST_FILE" | sed 's/^# //')
          if [ -z "$TITLE" ]; then
            TITLE=$(basename "$POST_FILE" .md | sed 's/[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')
          fi
          # Read the full content
          CONTENT=$(cat "$POST_FILE")
          # Post to Dev.to
          RESPONSE=$(curl -s -X POST https://dev.to/api/articles \
            -H "Content-Type: application/json" \
            -H "api-key: $DEVTO_API_KEY" \
            -d "{\"article\":{\"title\":\"$TITLE\",\"body_markdown\":\"$CONTENT\",\"published\":true}}")
          echo "Dev.to response: $RESPONSE"
